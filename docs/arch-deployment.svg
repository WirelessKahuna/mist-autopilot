<svg xmlns="http://www.w3.org/2000/svg" width="780" viewBox="0 0 780 500" role="img" font-family="'JetBrains Mono','Fira Mono','Courier New',monospace">
  <title>Mist Autopilot — Deployment Architecture</title>
  <desc>End-to-end deployment architecture from local Docker Compose through GitHub, Railway, GoDaddy DNS, browser, FastAPI backend, and Mist Cloud API</desc>

  <!-- Background -->
  <rect width="780" height="500" rx="12" fill="#0c0f14"/>

  <!-- Title -->
  <text x="32" y="42" font-size="17" font-weight="700" fill="#f8fafc" letter-spacing="0.5">Mist Autopilot</text>
  <text x="32" y="60" font-size="9" font-weight="400" fill="#475569" letter-spacing="1.8">DEPLOYMENT ARCHITECTURE · TOOLS.WIRELESSKAHUNA.COM</text>

  <!-- Divider under title -->
  <line x1="32" y1="72" x2="748" y2="72" stroke="#1e293b" stroke-width="1"/>

  <!-- ═══════════════════════════════════
       SECTION LABEL: Build and deploy
  ════════════════════════════════════ -->
  <rect x="32" y="86" width="3" height="10" fill="#1e293b"/>
  <text x="42" y="96" font-size="8" font-weight="400" fill="#334155" letter-spacing="1.6">BUILD &amp; DEPLOY PATH</text>

  <!-- ── Node: Local / Docker Compose ── -->
  <rect x="32" y="110" width="140" height="66" rx="6" fill="#131820" stroke="#1e2836" stroke-width="1"/>
  <text x="52" y="128" font-size="8" font-weight="700" fill="#64748b" letter-spacing="1.4">LOCAL</text>
  <text x="52" y="145" font-size="10" font-weight="400" fill="#94a3b8">Docker Compose</text>
  <text x="52" y="161" font-size="9" font-weight="400" fill="#475569">FastAPI + React/Vite</text>

  <!-- Arrow → GitHub -->
  <line x1="174" y1="143" x2="218" y2="143" stroke="#334155" stroke-width="1" marker-end="url(#arr)"/>
  <text x="196" y="136" font-size="8" fill="#475569" text-anchor="middle" letter-spacing="0.8">git push</text>

  <!-- ── Node: GitHub ── -->
  <rect x="220" y="110" width="140" height="66" rx="6" fill="#160d2e" stroke="#2d1b6b" stroke-width="1"/>
  <text x="240" y="128" font-size="8" font-weight="700" fill="#a78bfa" letter-spacing="1.4">GITHUB</text>
  <text x="240" y="145" font-size="10" font-weight="400" fill="#c4b5fd">Public repo</text>
  <text x="240" y="161" font-size="9" font-weight="400" fill="#6d4fd4">branch: main</text>

  <!-- Arrow → Railway -->
  <line x1="362" y1="143" x2="406" y2="143" stroke="#334155" stroke-width="1" marker-end="url(#arr)"/>
  <text x="384" y="136" font-size="8" fill="#475569" text-anchor="middle" letter-spacing="0.8">auto-deploy</text>

  <!-- ── Node: Railway ── -->
  <rect x="408" y="110" width="150" height="66" rx="6" fill="#061e1a" stroke="#0f4a40" stroke-width="1"/>
  <text x="428" y="128" font-size="8" font-weight="700" fill="#2dd4bf" letter-spacing="1.4">RAILWAY · CLOUD</text>
  <text x="428" y="145" font-size="10" font-weight="400" fill="#5eead4">Docker container</text>
  <text x="428" y="161" font-size="9" font-weight="400" fill="#0f6e56">FastAPI + static build</text>

  <!-- Arrow → GoDaddy -->
  <line x1="560" y1="143" x2="604" y2="143" stroke="#334155" stroke-width="1" marker-end="url(#arr)"/>
  <text x="582" y="136" font-size="8" fill="#475569" text-anchor="middle" letter-spacing="0.8">CNAME</text>

  <!-- ── Node: GoDaddy ── -->
  <rect x="606" y="110" width="142" height="66" rx="6" fill="#1a1100" stroke="#4a2d00" stroke-width="1"/>
  <text x="626" y="128" font-size="8" font-weight="700" fill="#f59e0b" letter-spacing="1.4">GODADDY DNS</text>
  <text x="626" y="145" font-size="10" font-weight="400" fill="#fbbf24">wirelesskahuna.com</text>
  <text x="626" y="161" font-size="9" font-weight="400" fill="#92670a">tools subdomain</text>

  <!-- Divider between sections -->
  <line x1="32" y1="202" x2="748" y2="202" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ═══════════════════════════════════
       SECTION LABEL: Runtime
  ════════════════════════════════════ -->
  <rect x="32" y="216" width="3" height="10" fill="#1e293b"/>
  <text x="42" y="226" font-size="8" font-weight="400" fill="#334155" letter-spacing="1.6">RUNTIME DATA PATH</text>

  <!-- ── Node: Browser ── -->
  <rect x="32" y="242" width="190" height="86" rx="6" fill="#050e1f" stroke="#0f2d5a" stroke-width="1"/>
  <text x="52" y="260" font-size="8" font-weight="700" fill="#3b82f6" letter-spacing="1.4">BROWSER · OPERATOR</text>
  <text x="52" y="277" font-size="10" font-weight="400" fill="#60a5fa">Pastes Mist token</text>
  <text x="52" y="293" font-size="9" font-weight="400" fill="#1e3a5f">Session stored client-side</text>
  <text x="52" y="309" font-size="9" font-weight="400" fill="#1e3a5f">Token never returned to browser</text>

  <!-- Arrow Browser → Backend -->
  <line x1="224" y1="285" x2="278" y2="285" stroke="#334155" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="278" y1="285" x2="224" y2="285" stroke="#334155" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="251" y="272" font-size="8" fill="#475569" text-anchor="middle" letter-spacing="0.6">HTTPS</text>
  <text x="251" y="298" font-size="8" fill="#334155" text-anchor="middle" letter-spacing="0.6">X-Session-Token</text>

  <!-- ── Node: FastAPI Backend ── -->
  <rect x="280" y="242" width="220" height="86" rx="6" fill="#061e1a" stroke="#0f4a40" stroke-width="1"/>
  <text x="300" y="260" font-size="8" font-weight="700" fill="#2dd4bf" letter-spacing="1.4">FASTAPI BACKEND</text>
  <text x="300" y="277" font-size="10" font-weight="400" fill="#5eead4">12 modules · asyncio.gather</text>
  <text x="300" y="293" font-size="9" font-weight="400" fill="#0f6e56">Scores · findings · drill-down</text>
  <!-- Badges -->
  <rect x="300" y="302" width="76" height="16" rx="3" fill="#0a2e28" stroke="#0f4a40" stroke-width="0.5"/>
  <text x="338" y="313" font-size="8" fill="#2dd4bf" text-anchor="middle" letter-spacing="0.8">TTLCache 5 min</text>
  <rect x="384" y="302" width="68" height="16" rx="3" fill="#0a2e28" stroke="#0f4a40" stroke-width="0.5"/>
  <text x="418" y="313" font-size="8" fill="#2dd4bf" text-anchor="middle" letter-spacing="0.8">API counter</text>

  <!-- Arrow Backend → Mist (bidirectional) -->
  <line x1="502" y1="285" x2="556" y2="285" stroke="#334155" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="556" y1="285" x2="502" y2="285" stroke="#334155" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="529" y="272" font-size="8" fill="#475569" text-anchor="middle" letter-spacing="0.6">server-side</text>
  <text x="529" y="298" font-size="8" fill="#334155" text-anchor="middle" letter-spacing="0.6">Mist token</text>

  <!-- ── Node: Mist Cloud API ── -->
  <rect x="558" y="242" width="190" height="86" rx="6" fill="#1f0a06" stroke="#5a1a0a" stroke-width="1"/>
  <text x="578" y="260" font-size="8" font-weight="700" fill="#f97316" letter-spacing="1.4">MIST CLOUD API</text>
  <text x="578" y="277" font-size="10" font-weight="400" fill="#fb923c">api.mist.com</text>
  <text x="578" y="293" font-size="9" font-weight="400" fill="#7c3010">12 endpoints · parallel calls</text>
  <!-- Badge -->
  <rect x="578" y="302" width="96" height="16" rx="3" fill="#200c06" stroke="#5a1a0a" stroke-width="0.5"/>
  <text x="626" y="313" font-size="8" fill="#f97316" text-anchor="middle" letter-spacing="0.8">5 000 calls / hr limit</text>

  <!-- ── Cache note (below backend) ── -->
  <line x1="390" y1="330" x2="390" y2="370" stroke="#1e293b" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="300" y="372" width="182" height="44" rx="6" fill="#061208" stroke="#0f3015" stroke-width="1"/>
  <text x="391" y="390" font-size="8" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="1.4">IN-MEMORY CACHE</text>
  <text x="391" y="407" font-size="9" font-weight="400" fill="#166534" text-anchor="middle">~40% API call reduction</text>

  <!-- Footer divider -->
  <line x1="32" y1="440" x2="748" y2="440" stroke="#1e293b" stroke-width="1"/>

  <!-- Legend -->
  <line x1="32" y1="458" x2="60" y2="458" stroke="#334155" stroke-width="1"/>
  <text x="66" y="462" font-size="8" fill="#475569" letter-spacing="0.8">Live data path</text>
  <line x1="150" y1="458" x2="178" y2="458" stroke="#334155" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="184" y="462" font-size="8" fill="#475569" letter-spacing="0.8">Cached path</text>
  <text x="748" y="462" font-size="8" fill="#1e293b" text-anchor="end" letter-spacing="0.8">mist-autopilot · Signal &amp; Noise · 2026</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M8 1L2 5L8 9" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
